<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 5px 10px; margin: 5px; }
    .card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>Pending Vehicles</h2>
<div id="vehicles"></div>

<h2>Pending Hotels</h2>
<div id="hotels"></div>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadVehicles() {
  const { data } = await supabase
    .from('vehicle_submissions')
    .select('*')
    .eq('status', 'pending');

  const container = document.getElementById('vehicles');
  container.innerHTML = '';

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <b>${item.title}</b><br>
        ${item.description}<br>
        <button onclick="approveVehicle(${item.id})">Approve</button>
      </div>
    `;
  });
}

async function approveVehicle(id) {
  await supabase
    .from('vehicle_submissions')
    .update({ status: 'approved' })
    .eq('id', id);

  loadVehicles();
}

async function loadHotels() {
  const { data } = await supabase
    .from('property_submissions')
    .select('*')
    .eq('status', 'pending');

  const container = document.getElementById('hotels');
  container.innerHTML = '';

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <b>${item.name}</b><br>
        ${item.location}<br>
        <button onclick="approveHotel(${item.id})">Approve</button>
      </div>
    `;
  });
}

async function approveHotel(id) {
  await supabase
    .from('property_submissions')
    .update({ status: 'approved' })
    .eq('id', id);

  loadHotels();
}

loadVehicles();
loadHotels();
</script>

</body>
</html>
