<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - BookingMongolia</title>
<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

.hidden { display: none; }

.card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  padding: 6px 12px;
  margin-right: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>Admin Panel</h2>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="pin" placeholder="Enter PIN">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h3>Community Posts</h3>
  <div id="posts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://ebpjetcuabubihzximbb.supabase.co";
const SUPABASE_KEY = "sb_publishable_3F9zG4HoMOCgU4yHvUkiKw_h5VTeeRF";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 PIN (өөрчилж болно)
const ADMIN_PIN = "1234";

function login() {
  const pin = document.getElementById("pin").value;
  if (pin === ADMIN_PIN) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("admin").classList.remove("hidden");
    loadPosts();
  } else {
    alert("Wrong PIN");
  }
}

// 📦 LOAD POSTS
async function loadPosts() {
  const { data, error } = await supabase
    .from("community_posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${post.title || "No title"}</h4>
      <p>${post.content || ""}</p>
      <small>Status: ${post.status}</small><br><br>

      <button onclick="approve('${post.id}')">Approve</button>
      <button onclick="hidePost('${post.id}')">Hide</button>
      <button onclick="deletePost('${post.id}')">Delete</button>
    `;

    container.appendChild(div);
  });
}

// ✅ APPROVE
async function approve(id) {
  await supabase
    .from("community_posts")
    .update({ status: "published" })
    .eq("id", id);

  loadPosts();
}

// 🚫 HIDE
async function hidePost(id) {
  await supabase
    .from("community_posts")
    .update({ status: "hidden" })
    .eq("id", id);

  loadPosts();
}

// ❌ DELETE
async function deletePost(id) {
  if (!confirm("Delete this post?")) return;

  await supabase
    .from("community_posts")
    .delete()
    .eq("id", id);

  loadPosts();
}
</script>

</body>
</html>
